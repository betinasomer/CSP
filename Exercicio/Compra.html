<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Compras</title>
  </head>
  <body>
    <h2>Lista de Compras</h2>

    <input type="text" id="itemInput" placeholder="Digite um item" />
    <button onclick="adicionarItem()">Adicionar</button>
    <br />

    <input type="text" id="itemRemover" placeholder="Item a remover" />
    <button onclick="removerItem()">Remover</button>
    <br />
    
    <button onclick="mostrarLista()">Mostrar Lista</button>
    <br />
    
    <button onclick="ordenarLista()">Ordenar Lista</button>
    <br />

    <p id="resultado"></p>

    <script>
      let listaDeCompras = [];
     
      function adicionarItem() {
          var item = document.getElementById("itemInput").value;
          listaDeCompras.push(item);
          console.log(listaDeCompras);
      }
      function ordenarLista() {
        listaDeCompras.sort();
      }


      function removerItem() {
          var item_rem = document.getElementById("itemRemover").value
          if(item_rem == ""){
            alert("precisa de um item pelo menos")
      } else {
            for(var i = 0; i < listaDeCompras.length; i++) {
                if (listaDeCompras[i] === item_rem) {
                    listaDeCompras.splice(i, 1);
                    break;
                }
            }
            console.log(listaDeCompras);
          }
      }
      function mostrarLista() {
          var resultado = document.getElementById("resultado");
          resultado.innerHTML = "";
          if(listaDeCompras.length != 0){
            for (var i = 0; i < listaDeCompras.length; i++) {
              resultado.innerHTML += listaDeCompras[i] + ", ";
          }
          }


      }

    </script>
  </body>
</html>
